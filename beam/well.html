    // ── Trends ──
    var TREND_PARAMS = {
        // XSPOC (real-time SCADA, 5-min)
        PctRun:      { label: 'Runtime %',       color: '#22c55e', unit: '%',     source: 'xspoc', group: 'XSPOC' },
        Fillage:     { label: 'Fillage',         color: '#a855f7', unit: '%',     source: 'xspoc', group: 'XSPOC' },
        InferredProd:{ label: 'Inferred Prod',   color: '#f59e0b', unit: 'bbl/d', source: 'xspoc', group: 'XSPOC' },
        PPRL:        { label: 'Peak Load',       color: '#c8a951', unit: 'lbs',   source: 'xspoc', group: 'XSPOC' },
        MPRL:        { label: 'Min Load',        color: '#3b82f6', unit: 'lbs',   source: 'xspoc', group: 'XSPOC' },
        FluidLoad:   { label: 'Fluid Load',      color: '#06b6d4', unit: 'lbs',   source: 'xspoc', group: 'XSPOC' },
        SPM:         { label: 'SPM',             color: '#ef4444', unit: 'spm',   source: 'xspoc', group: 'XSPOC' },
        // Analysis (PBI production, daily)
        Oil:         { label: 'Oil',             color: '#84cc16', unit: 'bbl',   source: 'pbi',   group: 'Analysis' },
        Gas:         { label: 'Gas',             color: '#f97316', unit: 'MCF',   source: 'pbi',   group: 'Analysis' },
        Water:       { label: 'Water',           color: '#0ea5e9', unit: 'bbl',   source: 'pbi',   group: 'Analysis' },
        InjWater:    { label: 'Inj Water',       color: '#8b5cf6', unit: 'bbl',   source: 'pbi',   group: 'Analysis' },
        FTP:         { label: 'FTP',             color: '#ec4899', unit: 'psi',   source: 'pbi',   group: 'Analysis' },
        CP:          { label: 'CP',              color: '#14b8a6', unit: 'psi',   source: 'pbi',   group: 'Analysis' },
    };
    var trendPanels = [];
    var trendData = {};  // cached: { paramName: [{x,y},...] }
    var trendDays = 7;
    var panelCounter = 0;

    function addChartPanel(initialParams, initialAxis) {
        var id = panelCounter++;
        var panel = { id: id, params: initialParams || ['PctRun'], chart: null, axisAssign: initialAxis || {} };
        trendPanels.push(panel);
        renderPanelHTML(panel);
        createPanelChart(panel);
        updatePanelChart(panel);
        return panel;
    }

    function renderPanelHTML(panel) {
        var container = document.getElementById('trendPanels');
        var div = document.createElement('div');
        div.id = 'trendPanel-' + panel.id;
        div.className = 'info-card mb-4';
        // Header row with legend chips + gear + remove buttons
        var headerHtml = '<div class="flex flex-wrap items-center gap-2 mb-2">';
        headerHtml += '<div id="trendLegend-' + panel.id + '" class="flex flex-wrap gap-2 flex-1"></div>';
        headerHtml += '<button class="text-gray-400 hover:text-fae-gold text-sm px-1" onclick="openChartConfig(' + panel.id + ')" title="Configure chart">&#9881;</button>';
        headerHtml += '<button class="text-gray-600 hover:text-red-400 text-sm px-1" onclick="removePanel(' + panel.id + ')" title="Remove chart">&#10005;</button>';
        headerHtml += '</div>';
        div.innerHTML = headerHtml + '<div style="height:280px; position:relative;"><canvas id="trendCanvas-' + panel.id + '"></canvas></div>';
        container.appendChild(div);
        updatePanelLegend(panel);
    }

    function updatePanelLegend(panel) {
        var el = document.getElementById('trendLegend-' + panel.id);
        if (!el) return;
        el.innerHTML = panel.params.map(function(pname) {
            var p = TREND_PARAMS[pname];
            if (!p) return '';
            var c = (panel.colorOverrides && panel.colorOverrides[pname]) || p.color;
            var axisLabel = (panel.axisAssign && panel.axisAssign[pname] === 'right') ? 'R' : 'L';
            return '<span class="text-xs px-1.5 py-0.5 rounded" style="background:' + c + '22;color:' + c + ';border:1px solid ' + c + '44">'
                + p.label + ' <span class="opacity-50">(' + axisLabel + ')</span></span>';
        }).join('');
        if (panel.params.length === 0) el.innerHTML = '<span class="text-xs text-gray-600">No fields selected — click &#9881; to configure</span>';
    }

    function openChartConfig(panelId) {
        var panel = trendPanels.find(function(p) { return p.id === panelId; });
        if (!panel) return;
        if (!panel.axisAssign) panel.axisAssign = {};
        // Build dialog HTML
        var html = '<div class="cfg-overlay" id="cfgOverlay-' + panelId + '" onclick="if(event.target===this)closeChartConfig(' + panelId + ')">';
        html += '<div class="cfg-dialog">';
        html += '<h3>Configure Chart</h3>';
        html += '<div class="text-xs text-gray-500 mb-3">Select fields and assign to Left or Right axis</div>';
        var lastGroup = '';
        for (var pname in TREND_PARAMS) {
            var p = TREND_PARAMS[pname];
            if (p.group && p.group !== lastGroup) {
                lastGroup = p.group;
                html += '<div class="text-xs text-gray-500 font-semibold mt-2 mb-1 uppercase tracking-wider">' + p.group + '</div>';
            }
            var checked = panel.params.indexOf(pname) >= 0 ? ' checked' : '';
            var axisVal = (panel.axisAssign[pname] === 'right') ? 'right' : 'left';
            html += '<div class="cfg-row">';
            var curColor = (panel.colorOverrides && panel.colorOverrides[pname]) || p.color;
            html += '<input type="checkbox" id="cfg-' + panelId + '-' + pname + '"' + checked + ' class="accent-current" style="accent-color:' + curColor + '">';
            html += '<input type="color" id="cfgColor-' + panelId + '-' + pname + '" value="' + curColor + '" style="width:22px;height:22px;padding:0;border:none;background:none;cursor:pointer" title="Change color">';
            html += '<label for="cfg-' + panelId + '-' + pname + '" style="color:' + curColor + ';flex:1">' + p.label + ' <span class="text-gray-500">(' + p.unit + ')</span></label>';
            html += '<select id="cfgAxis-' + panelId + '-' + pname + '"><option value="left"' + (axisVal === 'left' ? ' selected' : '') + '>Left</option><option value="right"' + (axisVal === 'right' ? ' selected' : '') + '>Right</option></select>';
            html += '</div>';
        }
        // Axis scale section
        var sc = panel.scaleConfig || {};
        html += '<div class="grid grid-cols-2 gap-3 mt-3 pt-3" style="border-top:1px solid #374151">';
        html += '<div><div class="text-xs text-gray-400 mb-1">Left Axis Scale</div>';
        html += '<div class="flex gap-2"><input type="number" id="cfgLMin-' + panelId + '" placeholder="Min (auto)" value="' + (sc.leftMin != null ? sc.leftMin : '') + '" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-xs text-gray-200 w-full">';
        html += '<input type="number" id="cfgLMax-' + panelId + '" placeholder="Max (auto)" value="' + (sc.leftMax != null ? sc.leftMax : '') + '" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-xs text-gray-200 w-full"></div></div>';
        html += '<div><div class="text-xs text-gray-400 mb-1">Right Axis Scale</div>';
        html += '<div class="flex gap-2"><input type="number" id="cfgRMin-' + panelId + '" placeholder="Min (auto)" value="' + (sc.rightMin != null ? sc.rightMin : '') + '" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-xs text-gray-200 w-full">';
        html += '<input type="number" id="cfgRMax-' + panelId + '" placeholder="Max (auto)" value="' + (sc.rightMax != null ? sc.rightMax : '') + '" class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-xs text-gray-200 w-full"></div></div>';
        html += '</div>';
        html += '<div class="flex justify-end gap-2 mt-4">';
        html += '<button class="card-nav-btn text-xs" onclick="closeChartConfig(' + panelId + ')">Cancel</button>';
        html += '<button class="card-nav-btn text-xs" onclick="applyChartConfig(' + panelId + ');saveDefaultConfig()">Apply as Default</button>';
        html += '<button class="card-nav-btn active text-xs" onclick="applyChartConfig(' + panelId + ')">Apply</button>';
        html += '</div></div></div>';
        document.body.insertAdjacentHTML('beforeend', html);
    }

    function closeChartConfig(panelId) {
        var overlay = document.getElementById('cfgOverlay-' + panelId);
        if (overlay) overlay.remove();
    }

    function applyChartConfig(panelId) {
        var panel = trendPanels.find(function(p) { return p.id === panelId; });
        if (!panel) return;
        var newParams = [];
        var newAxis = {};
        var newColors = {};
        for (var pname in TREND_PARAMS) {
            var cb = document.getElementById('cfg-' + panelId + '-' + pname);
            var ax = document.getElementById('cfgAxis-' + panelId + '-' + pname);
            var clr = document.getElementById('cfgColor-' + panelId + '-' + pname);
            if (cb && cb.checked) {
                newParams.push(pname);
                newAxis[pname] = ax ? ax.value : 'left';
            }
            if (clr && clr.value !== TREND_PARAMS[pname].color) {
                newColors[pname] = clr.value;
            }
        }
        // Read scale config
        var lMin = document.getElementById('cfgLMin-' + panelId).value;
        var lMax = document.getElementById('cfgLMax-' + panelId).value;
        var rMin = document.getElementById('cfgRMin-' + panelId).value;
        var rMax = document.getElementById('cfgRMax-' + panelId).value;
        panel.scaleConfig = {
            leftMin: lMin !== '' ? parseFloat(lMin) : null,
            leftMax: lMax !== '' ? parseFloat(lMax) : null,
            rightMin: rMin !== '' ? parseFloat(rMin) : null,
            rightMax: rMax !== '' ? parseFloat(rMax) : null,
        };
        panel.params = newParams;
        panel.axisAssign = newAxis;
        panel.colorOverrides = newColors;
        closeChartConfig(panelId);
        updatePanelLegend(panel);
        // Fetch missing data then update chart
        var missing = newParams.filter(function(n) { return !trendData[n]; });
        if (missing.length > 0) {
            fetchTrendParams(missing).then(function() { updatePanelChart(panel); saveChartConfig(); });
        } else {
            updatePanelChart(panel);
            saveChartConfig();
        }
    }

    function createPanelChart(panel) {
        var ctx = document.getElementById('trendCanvas-' + panel.id).getContext('2d');
        panel.chart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [] },
            options: {
                responsive: true, maintainAspectRatio: false,
                animation: { duration: 300 },
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { display: true, position: 'top', labels: { color: '#9ca3af', boxWidth: 12, font: { size: 11 }, padding: 12, usePointStyle: true } },
                    tooltip: {
                        backgroundColor: '#1f2937', borderColor: '#374151', borderWidth: 1,
                        titleColor: '#9ca3af', bodyColor: '#e5e7eb',
                        callbacks: {
                            label: function(ctx) {
                                var ds = ctx.dataset;
                                return ds.label + ': ' + ctx.parsed.y.toFixed(1) + ' ' + (ds._unit || '');
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'time',
                        time: { tooltipFormat: 'MMM d, h:mm a' },
                        ticks: { color: '#6b7280', maxTicksLimit: 8, font: { size: 11 } },
                        grid: { color: '#1f2937' }
                    }
                }
            }
        });
    }

    function updatePanelChart(panel) {
        var chart = panel.chart;
        if (!chart) return;
        if (!panel.axisAssign) panel.axisAssign = {};
        // Collect units for left and right axes
        var leftUnits = [], rightUnits = [];
        panel.params.forEach(function(pname) {
            var p = TREND_PARAMS[pname];
            if (!p) return;
            var side = panel.axisAssign[pname] || 'left';
            var list = side === 'right' ? rightUnits : leftUnits;
            if (list.indexOf(p.unit) < 0) list.push(p.unit);
        });
        // Build Y-axis configs with optional scale limits
        var sc = panel.scaleConfig || {};
        var yScales = {};
        if (leftUnits.length > 0 || panel.params.length === 0) {
            yScales.y = {
                type: 'linear', position: 'left', display: true,
                ticks: { color: '#6b7280', font: { size: 11 } },
                grid: { color: '#1f2937' },
                title: { display: true, text: leftUnits.join(' / '), color: '#6b7280', font: { size: 11 } },
            };
            if (sc.leftMin != null) yScales.y.min = sc.leftMin;
            if (sc.leftMax != null) yScales.y.max = sc.leftMax;
        }
        if (rightUnits.length > 0) {
            yScales.y1 = {
                type: 'linear', position: 'right', display: true,
                ticks: { color: '#6b7280', font: { size: 11 } },
                grid: { color: 'transparent' },
                title: { display: true, text: rightUnits.join(' / '), color: '#6b7280', font: { size: 11 } },
            };
            if (sc.rightMin != null) yScales.y1.min = sc.rightMin;
            if (sc.rightMax != null) yScales.y1.max = sc.rightMax;
        }
        // Rebuild datasets
        var datasets = [];
        panel.params.forEach(function(pname) {
            var p = TREND_PARAMS[pname];
            if (!p) return;
            var side = panel.axisAssign[pname] || 'left';
            var scaleId = side === 'right' ? 'y1' : 'y';
            var pts = trendData[pname] || [];
            var useColor = (panel.colorOverrides && panel.colorOverrides[pname]) || p.color;
            datasets.push({
                label: p.label, data: pts, borderColor: useColor,
                backgroundColor: useColor + '18', borderWidth: 1.5,
                pointRadius: 0, pointHitRadius: 6, fill: false,
                tension: 0.2, yAxisID: scaleId, _unit: p.unit,
            });
        });
        chart.data.datasets = datasets;
        // Update scales
        var scales = chart.options.scales;
        Object.keys(scales).forEach(function(k) { if (k.startsWith('y')) delete scales[k]; });
        Object.assign(scales, yScales);
        chart.update('none');
    }

    function removePanel(panelId) {
        var idx = trendPanels.findIndex(function(p) { return p.id === panelId; });
        if (idx < 0) return;
        var panel = trendPanels[idx];
        if (panel.chart) panel.chart.destroy();
        var el = document.getElementById('trendPanel-' + panelId);
        if (el) el.remove();
        trendPanels.splice(idx, 1);
        saveChartConfig();
    }

    function _getDaysParam() {
        if (trendDays === 'custom') {
            var from = document.getElementById('trendDateFrom').value;
            var to = document.getElementById('trendDateTo').value;
            if (from && to) return Math.ceil((new Date(to) - new Date(from)) / 86400000) + 1;
            return 7;
        }
        return trendDays;
    }

    async function _fetchFromEndpoint(endpoint, paramNames) {
        var days = _getDaysParam();
        var url = API_BASE + '/' + endpoint + '/' + encodeURIComponent(NODE_ID) + '?params=' + paramNames.join(',') + '&days=' + days;
        var resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + AUTH_TOKEN } });
        if (resp.status === 401) { signOut(); return 0; }
        if (!resp.ok) throw new Error(endpoint + ' HTTP ' + resp.status);
        var data = await resp.json();
        var pts = 0;
        for (var pname in data.params) {
            var pdata = data.params[pname];
            if (pdata && pdata.data) {
                trendData[pname] = pdata.data.map(function(pt) { return { x: pt[0], y: pt[1] }; });
                pts += pdata.data.length;
            }
        }
        return pts;
    }

    async function fetchTrendParams(paramNames) {
        if (!API_BASE || !AUTH_TOKEN) return;
        var allNeeded = paramNames.filter(function(n) { return !trendData[n]; });
        if (allNeeded.length === 0) return;
        document.getElementById('trendStatus').textContent = 'Loading...';
        // Split by source
        var xspocParams = allNeeded.filter(function(n) { return !TREND_PARAMS[n] || TREND_PARAMS[n].source !== 'pbi'; });
        var pbiParams = allNeeded.filter(function(n) { return TREND_PARAMS[n] && TREND_PARAMS[n].source === 'pbi'; });
        try {
            var totalPts = 0;
            var fetches = [];
            if (xspocParams.length > 0) fetches.push(_fetchFromEndpoint('history', xspocParams));
            if (pbiParams.length > 0) fetches.push(_fetchFromEndpoint('production', pbiParams));
            var results = await Promise.all(fetches);
            results.forEach(function(pts) { totalPts += pts; });
            document.getElementById('trendStatus').textContent = totalPts.toLocaleString() + ' points';
        } catch(e) {
            document.getElementById('trendStatus').textContent = 'Failed: ' + e.message;
        }
    }

    async function loadAllTrends() {
        // Collect all params across all panels
        var allParams = [];
        trendPanels.forEach(function(p) {
            p.params.forEach(function(n) { if (allParams.indexOf(n) < 0) allParams.push(n); });
        });
        trendData = {};  // clear cache for fresh range
        await fetchTrendParams(allParams);
        trendPanels.forEach(function(p) { updatePanelChart(p); });
    }

    function loadTrendsCustom() {
        trendDays = 'custom';
        document.querySelectorAll('#trendRangeNav button').forEach(function(b) { b.classList.remove('active'); });
        document.getElementById('customRangeBtn').classList.add('active');
        loadAllTrends();
    }

    async function initTrendCharts() {
        // Try to load saved config from server
        if (API_BASE && AUTH_TOKEN) {
            try {
                var url = API_BASE + '/chart-config/' + encodeURIComponent(NODE_ID);
                var resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + AUTH_TOKEN } });
                if (resp.ok) {
                    var cfg = await resp.json();
                    if (cfg.panels && cfg.panels.length > 0) {
                        if (cfg.days) trendDays = cfg.days;
                        cfg.panels.forEach(function(p) {
                            addChartPanel(p.params || [], p.axisAssign || {});
                            var panel = trendPanels[trendPanels.length - 1];
                            panel.scaleConfig = p.scaleConfig || {};
                            panel.colorOverrides = p.colorOverrides || {};
                        });
                        // Show config source
                        var srcEl = document.getElementById('configSource');
                        if (srcEl && cfg.source) srcEl.textContent = cfg.source === 'default' ? 'Using default template' : '';
                        return;
                    }
                }
            } catch(e) { /* fall through to defaults */ }
        }
        // Defaults
        addChartPanel(['PctRun'], {PctRun: 'left'});
        addChartPanel(['PPRL', 'MPRL'], {PPRL: 'left', MPRL: 'right'});
    }

    function saveChartConfig() {
        if (!API_BASE || !AUTH_TOKEN) return;
        var cfg = {
            days: trendDays,
            panels: trendPanels.map(function(p) {
                return { params: p.params, axisAssign: p.axisAssign || {}, scaleConfig: p.scaleConfig || {}, colorOverrides: p.colorOverrides || {} };
            })
        };
        var statusEl = document.getElementById('trendStatus');
        statusEl.textContent = 'Saving...';
        fetch(API_BASE + '/chart-config/' + encodeURIComponent(NODE_ID), {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + AUTH_TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify(cfg)
        }).then(function(r) {
            if (r.ok) {
                statusEl.textContent = 'Layout saved';
                setTimeout(function() { if (statusEl.textContent === 'Layout saved') statusEl.textContent = ''; }, 3000);
            } else {
                statusEl.textContent = 'Save failed (' + r.status + ')';
            }
        }).catch(function() { statusEl.textContent = 'Save failed'; });
    }

    function saveDefaultConfig() {
        if (!API_BASE || !AUTH_TOKEN) return;
        var cfg = {
            panels: trendPanels.map(function(p) {
                return { params: p.params, axisAssign: p.axisAssign || {}, scaleConfig: p.scaleConfig || {}, colorOverrides: p.colorOverrides || {} };
            })
        };
        var statusEl = document.getElementById('trendStatus');
        statusEl.textContent = 'Saving default...';
        fetch(API_BASE + '/chart-config-default', {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + AUTH_TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify(cfg)
        }).then(function(r) {
            if (r.ok) {
                statusEl.textContent = 'Default template saved';
                var srcEl = document.getElementById('configSource');
                if (srcEl) srcEl.textContent = '';
                setTimeout(function() { if (statusEl.textContent === 'Default template saved') statusEl.textContent = ''; }, 3000);
            } else {
                statusEl.textContent = 'Save default failed (' + r.status + ')';
            }
        }).catch(function() { statusEl.textContent = 'Save default failed'; });
    }

    // Range button clicks
    document.querySelectorAll('#trendRangeNav button').forEach(function(btn) {
        btn.addEventListener('click', function() {
            if (btn.dataset.days === 'custom') {
                document.getElementById('customRangePicker').style.display = 'flex';
                document.querySelectorAll('#trendRangeNav button').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                // Set defaults: last 7 days
                var now = new Date();
                var week = new Date(now - 7 * 86400000);
                document.getElementById('trendDateTo').value = now.toISOString().split('T')[0];
                document.getElementById('trendDateFrom').value = week.toISOString().split('T')[0];
                return;
            }
            document.getElementById('customRangePicker').style.display = 'none';
            document.querySelectorAll('#trendRangeNav button').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            trendDays = parseInt(btn.dataset.days);
            loadAllTrends();
        });
    });

    // ── Tabs ──
    document.querySelectorAll('.tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            ['trends', 'cards', 'analysis', 'wellinfo', 'alarms'].forEach(function(id) {
                document.getElementById('tab-' + id).classList.toggle('hidden', id !== tab.dataset.tab);
            });
        });
    });

    // ── Well navigation (prev/next arrows with filter) ──
    var allWellsData = [];  // raw wells array from wells.json
    var wellFilter = 'all';

    function wellMatchesFilter(w) {
        if (wellFilter === 'all') return true;
        var s = (w.RunStatus || '').toLowerCase();
        var c = (w.CommStatus || '');
        if (wellFilter === 'running') return s.includes('running');
        if (wellFilter === 'idle') return s.includes('idle');
        if (wellFilter === 'shutdown') return s.includes('shutdown');
        if (wellFilter === 'commgood') return c === 'OK';
        if (wellFilter === 'commfail') return c !== 'OK';
        return true;
    }

    function updateWellNav() {
        var filtered = allWellsData
            .filter(function(w) { return w.Enabled !== false; })
            .filter(wellMatchesFilter)
            .map(function(w) { return w.NodeID; })
            .sort();
        var idx = filtered.indexOf(NODE_ID);

        var prevBtn = document.getElementById('prevWell');
        var nextBtn = document.getElementById('nextWell');
        var posEl = document.getElementById('wellPosition');

        // Reset
        prevBtn.disabled = true;
        prevBtn.title = 'Previous well';
        prevBtn.onclick = null;
        nextBtn.disabled = true;
        nextBtn.title = 'Next well';
        nextBtn.onclick = null;

        if (idx < 0) {
            posEl.textContent = 'Not in filter (' + filtered.length + ' wells)';
            return;
        }

        posEl.textContent = (idx + 1) + ' / ' + filtered.length;

        var filterParam = wellFilter !== 'all' ? '&filter=' + wellFilter : '';
        if (idx > 0) {
            prevBtn.disabled = false;
            prevBtn.title = filtered[idx - 1];
            prevBtn.onclick = function() {
                window.location.href = 'well.html?id=' + encodeURIComponent(filtered[idx - 1]) + filterParam;
            };
        }
        if (idx < filtered.length - 1) {
            nextBtn.disabled = false;
            nextBtn.title = filtered[idx + 1];
            nextBtn.onclick = function() {
                window.location.href = 'well.html?id=' + encodeURIComponent(filtered[idx + 1]) + filterParam;
            };
        }
    }

    async function loadWellNav() {
        try {
            var resp = await fetch('data/wells.json?t=' + Date.now());
            if (!resp.ok) return;
            var data = await resp.json();
            allWellsData = data.wells || [];

            // Restore filter from URL param
            var filterParam = params.get('filter');
            if (filterParam) {
                wellFilter = filterParam;
                document.querySelectorAll('#wellFilterBar .filter-btn').forEach(function(btn) {
                    btn.classList.toggle('active', btn.dataset.filter === wellFilter);
                });
            }

            updateWellNav();
        } catch(e) { /* silent */ }
    }

    // Filter button clicks
    document.querySelectorAll('#wellFilterBar .filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#wellFilterBar .filter-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            wellFilter = btn.dataset.filter;
            updateWellNav();
        });
    });

    // ── Init — check session ──
    (function() {
      try {
        const saved = localStorage.getItem(SESSION_KEY);
        if (saved) {
          const session = JSON.parse(saved);
          if (session.expires > Date.now() && session.credential) {
            startApp(session);
            return;
          }
          localStorage.removeItem(SESSION_KEY);
        }
      } catch(e) { localStorage.removeItem(SESSION_KEY); }
    })();
    </script>
</body>
</html>
