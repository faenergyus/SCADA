<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Well Detail — Forty Acres Rod Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="js/wave-equation.js?v=17"></script>
    <script src="js/card-patterns.js?v=17"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fae-blue': '#1e3a5f',
                        'fae-gold': '#c8a951',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .info-card { background: #1f2937; border: 1px solid #374151; border-radius: 0.5rem; padding: 1rem; }
        .info-label { font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; }
        .info-value { font-size: 1.1rem; font-weight: 600; }
        .card-nav-btn { background: #374151; border: 1px solid #4b5563; border-radius: 0.375rem; padding: 0.25rem 0.75rem; font-size: 0.875rem; cursor: pointer; color: #d1d5db; }
        .card-nav-btn:hover { background: #4b5563; }
        .card-nav-btn.active { background: rgba(200,169,81,0.2); border-color: #c8a951; color: #c8a951; }
        .tab { cursor: pointer; padding: 0.5rem 1rem; border-bottom: 2px solid transparent; color: #9ca3af; }
        .tab:hover { color: #d1d5db; }
        .tab.active { color: #c8a951; border-color: #c8a951; }
        .alarm-row:nth-child(odd) { background: rgba(255,255,255,0.02); }
        .detail-row { display: flex; justify-content: space-between; padding: 0.25rem 0; border-bottom: 1px solid #1f2937; }
        .detail-row:last-child { border-bottom: none; }
        .filter-btn { border: 1px solid #374151; }
        .filter-btn.active { border-color: #c8a951; background: rgba(200,169,81,0.15); color: #c8a951; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-fae-blue border-b border-fae-gold/30 px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-2">
            <a href="index.html" class="text-xl font-bold text-fae-gold">Forty Acres Rod Status</a>
            <div class="text-sm text-gray-400 flex items-center gap-4">
                <span id="exportTime" class="text-gray-500"></span>
                <span id="clock"></span>
                <span class="text-gray-500 hidden sm:inline">Forty Acres Energy</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- Header -->
        <div class="flex flex-wrap items-center gap-2 mb-3">
            <a href="index.html" class="text-gray-400 hover:text-fae-gold text-sm">&larr; Back to All Wells</a>
            <div class="flex flex-wrap gap-1.5 ml-auto" id="wellFilterBar">
                <button class="filter-btn active text-xs px-2.5 py-1 rounded-lg text-gray-300" data-filter="all">All</button>
                <button class="filter-btn text-xs px-2.5 py-1 rounded-lg text-gray-300" data-filter="running">Running</button>
                <button class="filter-btn text-xs px-2.5 py-1 rounded-lg text-gray-300" data-filter="idle">Idle</button>
                <button class="filter-btn text-xs px-2.5 py-1 rounded-lg text-gray-300" data-filter="shutdown">Shutdown</button>
                <button class="filter-btn text-xs px-2.5 py-1 rounded-lg text-gray-300" data-filter="commgood">Comm Good</button>
                <button class="filter-btn text-xs px-2.5 py-1 rounded-lg text-gray-300" data-filter="commfail">Comm Fail</button>
            </div>
        </div>
        <div class="flex flex-wrap items-center gap-3 mb-6">
            <button id="prevWell" class="well-nav-btn text-gray-400 hover:text-fae-gold text-xl px-2 py-0.5 disabled:opacity-30 disabled:cursor-default" disabled title="Previous well">&lsaquo;</button>
            <h1 class="text-2xl font-bold text-fae-gold" id="wellName">Loading...</h1>
            <button id="nextWell" class="well-nav-btn text-gray-400 hover:text-fae-gold text-xl px-2 py-0.5 disabled:opacity-30 disabled:cursor-default" disabled title="Next well">&rsaquo;</button>
            <span id="commBadge" class="text-xs px-2 py-0.5 rounded-full"></span>
            <span id="runBadge" class="text-xs px-2 py-0.5 rounded-full"></span>
            <span id="wellPosition" class="text-xs text-gray-500 ml-auto"></span>
        </div>

        <!-- Status cards row -->
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-6" id="statusCards">
            <div class="info-card"><div class="info-label">Loading...</div></div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-700 mb-6 overflow-x-auto">
            <div class="tab active whitespace-nowrap" data-tab="cards">Dyno Cards</div>
            <div class="tab whitespace-nowrap" data-tab="analysis">Analysis</div>
            <div class="tab whitespace-nowrap" data-tab="wellinfo">Well Info</div>
            <div class="tab whitespace-nowrap" data-tab="alarms">Alarms</div>
        </div>

        <!-- Tab: Dyno Cards -->
        <div id="tab-cards">
            <div class="flex flex-wrap items-center gap-3 mb-4">
                <span class="text-sm text-gray-400">Card:</span>
                <div id="cardNav" class="flex flex-wrap gap-2"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div class="info-card">
                    <div class="text-sm text-gray-400 mb-2">Surface Card</div>
                    <div id="surfaceCardPlot" style="height:350px;"></div>
                </div>
                <div class="info-card">
                    <div class="text-sm text-gray-400 mb-2">Downhole Card</div>
                    <div id="downholeCardPlot" style="height:350px;"></div>
                </div>
            </div>
            <div class="mt-3 text-sm text-gray-400" id="cardInfo"></div>

            <!-- FAE Card Diagnosis (below cards) -->
            <div id="diagnosisPanel" class="mt-4 hidden">
                <div class="info-card">
                    <div class="text-fae-gold font-semibold mb-3">FAE Card Diagnosis</div>
                    <div id="diagnosisContent"></div>
                </div>
            </div>
        </div>

        <!-- Tab: Analysis -->
        <div id="tab-analysis" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="analysisContent">
                <div class="info-card"><div class="text-gray-500">Loading...</div></div>
            </div>
        </div>

        <!-- Tab: Well Info -->
        <div id="tab-wellinfo" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="wellInfoContent">
                <div class="info-card"><div class="text-gray-500">Loading...</div></div>
            </div>
        </div>

        <!-- Tab: Alarms -->
        <div id="tab-alarms" class="hidden">
            <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="text-left text-gray-400 border-b border-gray-700">
                        <th class="px-3 py-2">Date</th>
                        <th class="px-3 py-2">Description</th>
                    </tr>
                </thead>
                <tbody id="alarmBody">
                    <tr><td colspan="2" class="px-3 py-4 text-gray-500">Loading...</td></tr>
                </tbody>
            </table>
            </div>
        </div>
    </main>

    <script>
    // Get well ID from URL
    var params = new URLSearchParams(window.location.search);
    var NODE_ID = decodeURIComponent(params.get('id') || '');
    if (!NODE_ID) {
        document.getElementById('wellName').textContent = 'No well ID specified';
    } else {
        document.getElementById('wellName').textContent = NODE_ID;
        document.title = NODE_ID + ' — Forty Acres Rod Status';
    }

    var cards = [];
    var currentCardIdx = 0;
    var wellDataGlobal = null;  // store for wave equation

    // Clock
    function updateClock() {
        document.getElementById('clock').textContent = new Date().toLocaleString();
    }
    updateClock();
    setInterval(updateClock, 1000);

    function v(val, suffix) {
        if (val == null || val === '') return '&mdash;';
        return val + (suffix || '');
    }

    function vf(val, decimals, suffix) {
        if (val == null || val === '') return '&mdash;';
        return Number(val).toFixed(decimals || 0) + (suffix || '');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Load well detail data ──
    async function loadWellDetails() {
        try {
            var resp = await fetch('data/well_details.json?t=' + Date.now());
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var allDetails = await resp.json();

            // Handle _meta
            if (allDetails._meta && allDetails._meta.exported_at) {
                document.getElementById('exportTime').textContent =
                    'Data as of: ' + new Date(allDetails._meta.exported_at).toLocaleString();
            }

            // well_details.json is a dict keyed by NodeID, each value has {master, well_details, xdiag_last}
            var wellData = allDetails[NODE_ID];

            if (!wellData) {
                document.getElementById('statusCards').innerHTML =
                    '<div class="info-card col-span-full"><div class="text-red-400">Well not found in data</div></div>';
                return;
            }

            wellDataGlobal = wellData;
            var master = wellData.master || wellData;
            renderStatus(master);
            renderAnalysis(wellData.xdiag_last || wellData.xdiag || {});
            renderWellInfo(wellData.well_details || wellData.details || {}, master, wellData.rod_string);

            // Re-render current card with wave equation if cards already loaded
            if (cards.length > 0) selectCard(currentCardIdx);
        } catch (e) {
            document.getElementById('statusCards').innerHTML =
                '<div class="info-card col-span-full"><div class="text-red-400">Failed to load well details: ' + e.message + '</div></div>';
        }
    }

    async function loadCards() {
        try {
            var resp = await fetch('data/cards.json?t=' + Date.now());
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var allCards = await resp.json();
            // cards.json is a dict keyed by NodeID, each value is an array of cards
            cards = Array.isArray(allCards)
                ? allCards.filter(function(c) { return c.NodeID === NODE_ID; })
                : (allCards[NODE_ID] || []);

            renderCardNav();
            if (cards.length > 0) {
                selectCard(0);
            } else {
                document.getElementById('surfaceCardPlot').innerHTML =
                    '<div class="text-gray-500 text-center py-12">No dyno cards available</div>';
                document.getElementById('downholeCardPlot').innerHTML =
                    '<div class="text-gray-500 text-center py-12">&mdash;</div>';
                document.getElementById('cardInfo').textContent = '';
            }
        } catch (e) {
            document.getElementById('surfaceCardPlot').innerHTML =
                '<div class="text-gray-500 text-center py-12">Failed to load cards: ' + e.message + '</div>';
            document.getElementById('downholeCardPlot').innerHTML = '';
        }
    }

    async function loadAlarms() {
        try {
            var resp = await fetch('data/alarms.json?t=' + Date.now());
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var allAlarms = await resp.json();
            var alarmsList = Array.isArray(allAlarms) ? allAlarms : (allAlarms.alarms || []);

            // Filter to this well
            var wellAlarms = alarmsList.filter(function(a) {
                return a.NodeID === NODE_ID;
            });

            var tbody = document.getElementById('alarmBody');
            if (wellAlarms.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="px-3 py-4 text-gray-500">No alarms in last 90 days</td></tr>';
                return;
            }
            tbody.innerHTML = wellAlarms.map(function(a) {
                var dateStr = a.Date ? new Date(a.Date).toLocaleString() : '&mdash;';
                return '<tr class="alarm-row border-b border-gray-800">' +
                    '<td class="px-3 py-2 text-gray-300 whitespace-nowrap">' + dateStr + '</td>' +
                    '<td class="px-3 py-2">' + escapeHtml(a.Description || '') + (!a.Description ? '&mdash;' : '') + '</td>' +
                '</tr>';
            }).join('');
        } catch (e) {
            document.getElementById('alarmBody').innerHTML =
                '<tr><td colspan="2" class="px-3 py-4 text-red-400">Failed to load alarms: ' + e.message + '</td></tr>';
        }
    }

    // ── Render status cards ──
    function renderStatus(m) {
        // Comm badge
        var cb = document.getElementById('commBadge');
        cb.textContent = m.CommStatus || 'Unknown';
        cb.className = 'text-xs px-2 py-0.5 rounded-full ' +
            (m.CommStatus === 'OK' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300');

        // Run badge
        var rb = document.getElementById('runBadge');
        rb.textContent = m.RunStatus || '&mdash;';
        var rs = (m.RunStatus || '').toLowerCase();
        rb.className = 'text-xs px-2 py-0.5 rounded-full ' +
            (rs.includes('running') ? 'bg-green-900 text-green-300' :
             rs.includes('idle') ? 'bg-yellow-900 text-yellow-300' :
             'bg-red-900 text-red-300');

        var items = [
            { label: 'Pump Fillage', value: vf(m.PumpFillage, 0, '%') },
            { label: 'Inferred Prod', value: vf(m.InferredProd, 1, ' bbl') },
            { label: 'Today Runtime', value: vf(m.TodayRuntime, 1, ' hr') },
            { label: 'Yesterday RT%', value: vf(m.YestRuntimePct, 0, '%') },
            { label: 'Last Scan', value: m.LastGoodScanTime ? new Date(m.LastGoodScanTime).toLocaleString() : 'Never' },
            { label: 'Condition', value: m.LastAnalCondition || '&mdash;' },
        ];
        document.getElementById('statusCards').innerHTML = items.map(function(i) {
            return '<div class="info-card">' +
                '<div class="info-label">' + i.label + '</div>' +
                '<div class="info-value">' + i.value + '</div>' +
            '</div>';
        }).join('');
    }

    // ── Dyno card navigation ──
    function renderCardNav() {
        var nav = document.getElementById('cardNav');
        if (cards.length === 0) {
            nav.innerHTML = '<span class="text-gray-500 text-sm">No cards available</span>';
            return;
        }
        nav.innerHTML = cards.slice(0, 20).map(function(c, i) {
            var d = new Date(c.Date);
            var label = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            var typeMap = { S: 'Scan', N: 'Analysis', V: 'VFD', P: 'POC' };
            var typeLabel = typeMap[c.CardType] || c.CardType || '?';
            var typeBadge = c.CardType || '?';
            return '<button class="card-nav-btn' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '">' +
                label + ' <span class="text-xs opacity-60">(' + typeBadge + ')</span></button>';
        }).join('');

        nav.querySelectorAll('button').forEach(function(btn) {
            btn.addEventListener('click', function() {
                selectCard(parseInt(btn.dataset.idx));
            });
        });
    }

    function selectCard(idx) {
        currentCardIdx = idx;
        document.querySelectorAll('#cardNav button').forEach(function(btn, i) {
            btn.classList.toggle('active', i === idx);
        });
        var card = cards[idx];

        // Surface card
        var surfData = card.SurfaceCardB || card.SurfaceCard || null;
        plotCard('surfaceCardPlot', surfData, '#c8a951');

        // Downhole cards — XDiag and POC versions
        var dhData = card.DownholeCardB || card.DownholeCard || null;
        var pocData = card.POCDownholeCardB || null;

        // Try FAE wave equation calculation
        var faeCard = null;
        var rodModel = null;
        if (wellDataGlobal && surfData && surfData.position && surfData.load) {
            var wd = wellDataGlobal.well_details || {};
            var rs = wellDataGlobal.rod_string || [];
            if (rs.length > 0 && wd.PumpDepth > 0) {
                rodModel = WaveEquation.buildRodModel(rs, wd);
                if (rodModel) {
                    // Use per-well damping from XSPOC if available, else default 0.5
                    // XSPOC Friction can range 0.1–10+ in their units; cap to reasonable range
                    var xdiag = wellDataGlobal.xdiag_last || {};
                    var dampVal = Math.min(Math.max(xdiag.Friction || 0.5, 0.05), 1.5);
                    // Use XSPOC buoyant rod weight if available
                    var opts = { dampingFactor: dampVal };
                    if (xdiag.BouyRodWeight) opts.buoyantRodWeight = xdiag.BouyRodWeight;
                    faeCard = WaveEquation.calculateDownholeCard(
                        surfData.position, surfData.load, rodModel, opts
                    );
                }
            }
        }

        // Plot downhole with XSPOC, POC, and FAE overlays
        plotDownholeCard(dhData, pocData, faeCard);

        // Calculate expected loads from well data
        var wellCalc = null;
        if (rodModel) {
            wellCalc = calculateExpectedLoads(rodModel, surfData, dhData);
        }

        // Run diagnostics on the best available downhole card
        // IMPORTANT: Use XDiag DH card (correct plunger-load reference frame).
        // Do NOT use POC DH card (true sinker-bar load, different reference).
        // Fall back to FAE Calc (transfer matrix) if no XDiag available.
        var diagCard = dhData || faeCard;

        // Majority diagnosis across all loaded cards (temporal stability)
        var majority = getMajorityDiagnosis(cards, rodModel);

        // Card type and pump state detection
        var cardType = card.CardType || '?';
        var master = wellDataGlobal ? (wellDataGlobal.master || wellDataGlobal) : null;
        var pumpState = detectPumpState(master);

        // Per-well baseline comparison
        var baseline = getWellBaseline(cards, idx, rodModel);

        runDiagnostics(diagCard, rodModel, wellCalc, surfData, cards, idx, majority, cardType, dhData, baseline, pumpState);

        // Info below charts
        var infoStr = 'SPM: ' + vf(card.SPM, 1) +
            ' | Stroke: ' + v(card.StrokeLength, '"') +
            ' | Fillage: ' + vf(card.Fillage, 1, '%');
        if (wellCalc) {
            infoStr += ' | Fo=' + wellCalc.Fo + ' lbs, FAP=' + wellCalc.estFAP + ' ft';
        }
        if (faeCard && faeCard.meta) {
            infoStr += ' | FAE: ζ=' + faeCard.meta.dampingFactor +
                ', c=' + faeCard.meta.avgWaveSpeedFtS + ' ft/s';
        }
        document.getElementById('cardInfo').textContent = infoStr;
    }

    function plotCard(divId, cardData, color) {
        var el = document.getElementById(divId);
        if (!cardData || !cardData.position || cardData.position.length === 0) {
            el.innerHTML = '<div class="text-gray-500 text-center py-12">No data</div>';
            return;
        }

        var trace = {
            x: cardData.position,
            y: cardData.load,
            mode: 'lines',
            line: { color: color, width: 2 },
            fill: 'toself',
            fillcolor: hexToRgba(color, 0.08),
        };

        var layout = {
            paper_bgcolor: 'transparent',
            plot_bgcolor: 'transparent',
            margin: { t: 10, r: 20, b: 40, l: 60 },
            xaxis: { title: 'Position (in)', color: '#9ca3af', gridcolor: '#374151' },
            yaxis: { title: 'Load (lbs)', color: '#9ca3af', gridcolor: '#374151' },
            font: { color: '#9ca3af' },
        };

        Plotly.newPlot(el, [trace], layout, { responsive: true, displayModeBar: false });
    }

    function plotDownholeCard(xspocCard, pocCard, faeCard) {
        var el = document.getElementById('downholeCardPlot');
        var traces = [];

        if (xspocCard && xspocCard.position && xspocCard.position.length > 0) {
            traces.push({
                x: xspocCard.position,
                y: xspocCard.load,
                mode: 'lines',
                name: 'XDiag',
                line: { color: '#22c55e', width: 2 },
                fill: 'toself',
                fillcolor: hexToRgba('#22c55e', 0.08),
            });
        }

        if (pocCard && pocCard.position && pocCard.position.length > 0) {
            traces.push({
                x: pocCard.position,
                y: pocCard.load,
                mode: 'lines',
                name: 'POC',
                line: { color: '#f59e0b', width: 2, dash: 'dash' },
            });
        }

        if (faeCard && faeCard.position && faeCard.position.length > 0) {
            traces.push({
                x: faeCard.position,
                y: faeCard.load,
                mode: 'lines',
                name: 'FAE Calc',
                line: { color: '#3b82f6', width: 2, dash: 'dot' },
            });
        }

        if (traces.length === 0) {
            el.innerHTML = '<div class="text-gray-500 text-center py-12">No data</div>';
            return;
        }

        var layout = {
            paper_bgcolor: 'transparent',
            plot_bgcolor: 'transparent',
            margin: { t: 10, r: 20, b: 40, l: 60 },
            xaxis: { title: 'Position (in)', color: '#9ca3af', gridcolor: '#374151' },
            yaxis: { title: 'Load (lbs)', color: '#9ca3af', gridcolor: '#374151' },
            font: { color: '#9ca3af' },
            showlegend: traces.length > 1,
            legend: { x: 0.02, y: 0.98, bgcolor: 'rgba(0,0,0,0.5)', font: { color: '#d1d5db', size: 10 } },
        };

        Plotly.newPlot(el, traces, layout, { responsive: true, displayModeBar: false });
    }

    /**
     * Detect pump operational state from well master data.
     * Returns: 'running', 'starting', 'stopping', 'idle', 'shutdown', 'unknown'
     */
    function detectPumpState(master) {
        if (!master) return { state: 'unknown', label: 'Unknown', detail: '' };
        var rs = (master.RunStatus || '').toLowerCase();
        var tis = master.TimeInState; // seconds in current state

        if (rs.includes('shutdown')) {
            return { state: 'shutdown', label: 'Shutdown', detail: 'Unit shut down' + (tis ? ' for ' + formatDuration(tis) : '') };
        }
        if (rs.includes('idle')) {
            var idleDetail = 'Idle' + (tis ? ' for ' + formatDuration(tis) : '');
            if (rs.includes('timer')) idleDetail += ' (timer-controlled)';
            return { state: 'idle', label: 'Idle', detail: idleDetail };
        }
        if (rs.includes('stop')) {
            return { state: 'stopping', label: 'Pump-Off', detail: 'Stopping/pumping off' };
        }
        if (rs.includes('run') || rs.includes('pump')) {
            if (tis != null && tis < 300) {
                return { state: 'starting', label: 'Startup', detail: 'Running for ' + formatDuration(tis) + ' (startup — card may be abnormal)' };
            }
            return { state: 'running', label: 'Running', detail: 'Steady state' + (tis ? ' for ' + formatDuration(tis) : '') };
        }
        return { state: 'unknown', label: rs || 'Unknown', detail: '' };
    }

    function formatDuration(seconds) {
        if (seconds == null) return '?';
        if (seconds < 60) return seconds + 's';
        if (seconds < 3600) return Math.floor(seconds / 60) + 'm';
        return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
    }

    /**
     * Diagnose all loaded cards and return majority condition.
     * This provides temporal stability — a single outlier card doesn't
     * flip the diagnosis. XSPOC itself changes diagnosis 30-40% of the
     * time between consecutive cards on the same well.
     */
    function getMajorityDiagnosis(allCards, rodModel) {
        if (!allCards || allCards.length === 0) return null;
        var counts = {};
        var total = 0;
        for (var c = 0; c < allCards.length; c++) {
            var dhData = allCards[c].DownholeCardB || allCards[c].DownholeCard || null;
            if (!dhData || !dhData.position || dhData.position.length < 10) continue;
            var result = CardPatterns.analyzeCard(dhData.position, dhData.load, rodModel);
            if (result && result.primary) {
                var id = result.primary.pattern.id;
                counts[id] = (counts[id] || 0) + 1;
                total++;
            }
        }
        if (total === 0) return null;
        var best = null, bestN = 0;
        for (var id in counts) {
            if (counts[id] > bestN) { bestN = counts[id]; best = id; }
        }
        return { id: best, count: bestN, total: total, pct: Math.round(bestN / total * 100) };
    }

    /**
     * Compute per-well baseline from loaded cards.
     * Compares current card's features to the well's own average.
     * Returns deviation score: 0 = identical to baseline, >2 = significant change.
     */
    function getWellBaseline(allCards, currentIdx, rodModel) {
        if (!allCards || allCards.length < 2) return null;
        // Extract features from all cards with XDiag DH data
        var allFeatures = [];
        for (var c = 0; c < allCards.length; c++) {
            var dh = allCards[c].DownholeCardB || allCards[c].DownholeCard || null;
            if (!dh || !dh.position || dh.position.length < 10) continue;
            var f = CardPatterns.extractFeatures(dh.position, dh.load, rodModel);
            if (f && !f.error) allFeatures.push({ idx: c, f: f });
        }
        if (allFeatures.length < 2) return null;

        // Compute mean and std of key features across all cards
        var keys = ['areaRatio', 'flatTop', 'flatBottom', 'fluidPoundIdx', 'cdSharpness', 'abSharpness'];
        var means = {}, stds = {};
        for (var ki = 0; ki < keys.length; ki++) {
            var k = keys[ki];
            var vals = allFeatures.map(function(x) { return x.f[k]; }).filter(function(v) { return v != null && !isNaN(v); });
            if (vals.length < 2) continue;
            var m = vals.reduce(function(a, b) { return a + b; }, 0) / vals.length;
            var s = Math.sqrt(vals.reduce(function(a, b) { return a + (b - m) * (b - m); }, 0) / vals.length);
            means[k] = m;
            stds[k] = Math.max(s, 0.01);
        }

        // Find current card's features
        var currentFeats = null;
        for (var i = 0; i < allFeatures.length; i++) {
            if (allFeatures[i].idx === currentIdx) { currentFeats = allFeatures[i].f; break; }
        }
        if (!currentFeats) return null;

        // Compute deviation score (normalized Euclidean distance from baseline)
        var devSum = 0, devCount = 0;
        var devDetails = {};
        for (var ki = 0; ki < keys.length; ki++) {
            var k = keys[ki];
            if (means[k] === undefined || currentFeats[k] == null) continue;
            var zScore = (currentFeats[k] - means[k]) / stds[k];
            devSum += zScore * zScore;
            devCount++;
            devDetails[k] = { mean: Math.round(means[k] * 1000) / 1000, z: Math.round(zScore * 100) / 100 };
        }

        var deviation = devCount > 0 ? Math.sqrt(devSum / devCount) : 0;
        return {
            deviation: Math.round(deviation * 100) / 100,
            isOutlier: deviation > 2.0,
            details: devDetails,
            nCards: allFeatures.length,
        };
    }

    /**
     * Calculate expected loads and Fo reference lines.
     *
     * Fo = fluid load on plunger = fluid_gradient x pump_depth x plunger_area
     * FAP = estimated fluid above pump (from actual card loads)
     * Fillage = actual Fo / calculated Fo (independent of XSPOC)
     *
     * Sources: McCoy/Rowlan/Podio SWPSC 2015, Echometer TechNotes
     */
    function calculateExpectedLoads(rodModel, surfData, dhData) {
        if (!rodModel || !rodModel.pumpDepth) return null;
        var PI = Math.PI;
        var plungerArea = PI * rodModel.plungerDiam * rodModel.plungerDiam / 4;
        var fluidGrad = rodModel.fluidSG * 0.433; // psi/ft
        var pumpDepthFt = rodModel.pumpDepth / 12;
        var Fo = Math.round(fluidGrad * pumpDepthFt * plungerArea);

        // Buoyant rod weight
        var buoyWt = 0;
        var fluidDens = rodModel.fluidSG * 62.4 / 1728;
        for (var s = 0; s < rodModel.sections.length; s++) {
            var sec = rodModel.sections[s];
            var bf = 1 - fluidDens / sec.wDens;
            buoyWt += sec.weightPerIn * sec.length * bf;
        }
        buoyWt = Math.round(buoyWt);

        // Expected PPRL and MPRL (simplified, no dynamic load)
        var expPPRL = Fo + buoyWt;
        var expMPRL = buoyWt;

        // Actual surface card stats
        var actPPRL = null, actMPRL = null;
        if (surfData && surfData.load && surfData.load.length > 0) {
            actPPRL = Math.max.apply(null, surfData.load);
            actMPRL = Math.min.apply(null, surfData.load);
        }

        // Actual Fo from surface card (rough: PPRL - MPRL includes dynamics)
        var actualFoSurf = (actPPRL != null && actMPRL != null) ? actPPRL - actMPRL : 0;

        // Actual Fo from DH card (Echometer method: avg mid-upstroke - avg mid-downstroke)
        // This is more accurate because it excludes dynamic transients at transitions
        var actualFoDH = null;
        var foFillage = null;
        if (dhData && dhData.position && dhData.load && dhData.load.length > 10) {
            var N = dhData.load.length;
            var pos = dhData.position, ld = dhData.load;
            var topI = 0, botI = 0, topP = -1e9, botP = 1e9;
            for (var i = 0; i < N; i++) {
                if (pos[i] > topP) { topP = pos[i]; topI = i; }
                if (pos[i] < botP) { botP = pos[i]; botI = i; }
            }
            // Build upstroke/downstroke index arrays
            var upI = [], dnI = [];
            for (var k = 0; k < N; k++) { var i = (botI + k) % N; upI.push(i); if (i === topI) break; }
            for (var k = 0; k < N; k++) { var i = (topI + k) % N; dnI.push(i); if (i === botI) break; }
            // Average mid-stroke loads (exclude first/last 25%)
            function avgMid(arr) {
                if (arr.length < 8) return 0;
                var s = Math.floor(arr.length / 4), e = Math.floor(3 * arr.length / 4);
                var sum = 0, cnt = 0;
                for (var k = s; k < e; k++) { sum += ld[arr[k]]; cnt++; }
                return cnt > 0 ? sum / cnt : 0;
            }
            var avgUp = avgMid(upI);
            var avgDn = avgMid(dnI);
            actualFoDH = Math.round(avgUp - avgDn);
            foFillage = Fo > 0 ? Math.round(actualFoDH / Fo * 100) : null;
        }

        // Estimated FAP from actual Fo
        var estFAP = null;
        var bestFo = actualFoDH || actualFoSurf;
        if (bestFo > 0 && fluidGrad > 0 && plungerArea > 0) {
            estFAP = Math.round(bestFo / (fluidGrad * plungerArea));
        }

        return {
            Fo: Fo,                     // calculated fluid load (lbs)
            buoyWt: buoyWt,             // buoyant rod weight (lbs)
            expPPRL: expPPRL,           // expected peak polished rod load
            expMPRL: expMPRL,           // expected min polished rod load
            actPPRL: actPPRL != null ? Math.round(actPPRL) : null,
            actMPRL: actMPRL != null ? Math.round(actMPRL) : null,
            actualFoSurf: Math.round(actualFoSurf),  // Fo from surface card
            actualFoDH: actualFoDH,     // Fo from DH card (Echometer method)
            foFillage: foFillage,       // fillage from Fo ratio (%)
            estFAP: estFAP,             // estimated fluid above pump (ft)
            pumpDepthFt: Math.round(pumpDepthFt),
            plungerArea: Math.round(plungerArea * 1000) / 1000,
            fluidGrad: Math.round(fluidGrad * 10000) / 10000,
        };
    }

    function runDiagnostics(cardData, rodModel, wellCalc, surfData, allCards, cardIdx, majority, cardType, hasXDiagDH, baseline, pumpState) {
        var panel = document.getElementById('diagnosisPanel');
        var content = document.getElementById('diagnosisContent');

        if (!cardData || !cardData.position || cardData.position.length < 10) {
            panel.classList.add('hidden');
            return;
        }

        var result = CardPatterns.analyzeCard(cardData.position, cardData.load, rodModel);
        if (!result || !result.primary) {
            panel.classList.add('hidden');
            return;
        }

        // ── Surface card sanity check ──
        // If surface loads are in normal range (within 30% of expected PPRL/MPRL),
        // the pump is working. Override critical diagnoses like "Rod Part" that
        // would be impossible with normal surface loads.
        var surfaceSane = false;
        var sanityNote = '';
        if (wellCalc && wellCalc.actPPRL && wellCalc.expPPRL > 0) {
            var pprlRatio = wellCalc.actPPRL / wellCalc.expPPRL;
            var mprlRatio = wellCalc.expMPRL > 0 ? wellCalc.actMPRL / wellCalc.expMPRL : 1;
            surfaceSane = (pprlRatio > 0.60 && pprlRatio < 1.50);

            if (surfaceSane && result.primary.pattern.id === 'rod_part') {
                sanityNote = 'Surface card shows normal loads (PPRL=' + wellCalc.actPPRL +
                    ' vs expected ' + wellCalc.expPPRL + '). Rods are intact — "Rod Part" diagnosis overridden. ' +
                    'This card may be a scan-type (S) without XDiag processing.';
                // Demote rod_part, promote next match
                if (result.secondary) {
                    result.primary = result.secondary;
                    result.secondary = null;
                } else {
                    result.primary.pattern = { id: 'sensor_issue', name: 'Card Data Issue',
                        severity: 'info', description: 'Downhole card data does not match surface conditions. ' +
                        'This may be a scan-type card without wave equation processing, or a POC card using a different load reference frame.',
                        operationalMeaning: 'Surface loads confirm the pump is operating normally. The downhole card shape is unreliable for this card type.',
                        actions: ['Compare with adjacent Analysis (N) cards', 'Verify card type (S vs N vs P)'] };
                    result.primary.confidence = 0.50;
                }
            }
        }

        panel.classList.remove('hidden');

        var severityColors = {
            normal: 'bg-green-900/50 text-green-300 border-green-700',
            info: 'bg-blue-900/50 text-blue-300 border-blue-700',
            caution: 'bg-yellow-900/50 text-yellow-300 border-yellow-700',
            warning: 'bg-orange-900/50 text-orange-300 border-orange-700',
            critical: 'bg-red-900/50 text-red-300 border-red-700',
        };

        var html = '';

        // ── Card type + pump state (context bar) ──
        var typeMap = { S: 'Scan', N: 'Analysis', P: 'POC', V: 'VFD' };
        var typeName = typeMap[cardType] || cardType || '?';
        var typeColor = hasXDiagDH ? 'text-green-400' : 'text-yellow-400';
        html += '<div class="flex flex-wrap items-center gap-3 mb-2 text-xs">';
        html += '<span class="px-2 py-0.5 rounded bg-gray-800 ' + typeColor + '">Card: ' + typeName + ' (' + cardType + ')</span>';
        if (pumpState && pumpState.state !== 'unknown') {
            var stateColors = { running: 'text-green-400', starting: 'text-blue-400', stopping: 'text-orange-400', idle: 'text-yellow-400', shutdown: 'text-red-400' };
            var stateColor = stateColors[pumpState.state] || 'text-gray-400';
            html += '<span class="px-2 py-0.5 rounded bg-gray-800 ' + stateColor + '">' + escapeHtml(pumpState.label) + '</span>';
            if (pumpState.detail) html += '<span class="text-gray-500">' + escapeHtml(pumpState.detail) + '</span>';
        }
        if (!hasXDiagDH) {
            html += '<span class="text-yellow-500">No XDiag DH card — less reliable diagnosis.</span>';
        }
        html += '</div>';

        // ── Sanity check warning ──
        if (sanityNote) {
            html += '<div class="border rounded-lg p-3 mb-3 bg-blue-900/30 text-blue-300 border-blue-700">';
            html += '<strong>Surface Card Check:</strong> ' + escapeHtml(sanityNote);
            html += '</div>';
        }

        // Primary diagnosis
        var p = result.primary;
        var sevClass = severityColors[p.pattern.severity] || severityColors.info;
        html += '<div class="border rounded-lg p-4 mb-3 ' + sevClass + '">';
        html += '<div class="flex items-center gap-3 mb-2">';
        html += '<span class="text-lg font-bold">' + escapeHtml(p.pattern.name) + '</span>';
        html += '<span class="text-xs px-2 py-0.5 rounded-full bg-black/30">' +
            Math.round(p.confidence * 100) + '% confidence</span>';
        html += '<span class="text-xs uppercase px-2 py-0.5 rounded-full bg-black/20">' +
            p.pattern.severity + '</span>';
        html += '</div>';
        if (p.physicsRule) {
            html += '<p class="text-sm mb-2 text-fae-gold/80"><strong>Evidence:</strong> ' + escapeHtml(p.physicsRule) + '</p>';
        }
        html += '<p class="text-sm mb-2">' + escapeHtml(p.pattern.description) + '</p>';
        html += '<p class="text-sm opacity-80 mb-2"><strong>Operational:</strong> ' +
            escapeHtml(p.pattern.operationalMeaning) + '</p>';
        html += '<div class="text-sm"><strong>Recommended Actions:</strong><ul class="list-disc ml-5 mt-1">';
        for (var i = 0; i < p.pattern.actions.length; i++) {
            html += '<li>' + escapeHtml(p.pattern.actions[i]) + '</li>';
        }
        html += '</ul></div></div>';

        // Secondary and compound diagnoses
        for (var ri = 1; ri < result.allMatches.length && ri < 4; ri++) {
            var s = result.allMatches[ri];
            if (s.confidence < 0.10) continue;
            var sevClass2 = severityColors[s.pattern.severity] || severityColors.info;
            var isCompound = s.isSecondary;
            var label = isCompound ? 'Also noted' : 'Also possible';
            html += '<div class="border rounded-lg p-2 mb-2 ' + sevClass2 + ' opacity-' + (isCompound ? '60' : '70') + '">';
            html += '<div class="flex flex-wrap items-center gap-2">';
            html += '<span class="font-semibold text-sm">' + label + ': ' + escapeHtml(s.pattern.name) + '</span>';
            html += '<span class="text-xs px-2 py-0.5 rounded-full bg-black/30">' +
                Math.round(s.confidence * 100) + '%</span>';
            if (isCompound) html += '<span class="text-xs text-gray-500">(independent indicator)</span>';
            html += '</div>';
            if (s.physicsRule) {
                html += '<p class="text-xs mt-1 text-fae-gold/70">' + escapeHtml(s.physicsRule) + '</p>';
            }
            html += '</div>';
        }

        // Feature summary (collapsible)
        html += '<details class="mt-2">';
        html += '<summary class="text-sm text-gray-400 cursor-pointer">Shape Features (debug)</summary>';
        html += '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2 mt-2 text-xs">';
        var f = result.features;
        var featureLabels = {
            areaRatio: 'Area Ratio', loadRange: 'Load Range', upstrokeSlope: 'Upstroke Slope',
            downstrokeSlope: 'Downstroke Slope', tvTransition: 'TV Transition', svTransition: 'SV Transition',
            flatTop: 'Flat Top', flatBottom: 'Flat Bottom', fluidPoundIdx: 'Fluid Pound',
            gasCompression: 'Gas Compression', symmetry: 'Symmetry', bottomSpike: 'Bottom Spike',
            topSpike: 'Top Spike', tubingMovement: 'Tubing Movement', phaseShift: 'Phase Shift',
            cdSharpness: 'C→D Avg Slope', abSharpness: 'A→B Avg Slope',
            cdMaxSlope: 'C→D Max Slope', abMaxSlope: 'A→B Max Slope',
            dnLoadElev: 'DN Load Elev', upDropPt: 'UP Drop Point',
            maxDropLoc: 'Max Drop Location', dnConvexity: 'DN Convexity', earlyDnLoad: 'Early DN Load',
        };
        for (var key in featureLabels) {
            if (f[key] !== undefined) {
                html += '<div class="bg-gray-800 rounded px-2 py-1">';
                html += '<span class="text-gray-500">' + featureLabels[key] + ':</span> ';
                html += '<span class="text-gray-200">' + (typeof f[key] === 'number' ? f[key].toFixed(3) : f[key]) + '</span>';
                html += '</div>';
            }
        }
        html += '</div></details>';

        // ── Trend (temporal context) ──
        if (majority && majority.total >= 2) {
            var majPattern = null;
            for (var p = 0; p < CardPatterns.PATTERNS.length; p++) {
                if (CardPatterns.PATTERNS[p].id === majority.id) { majPattern = CardPatterns.PATTERNS[p]; break; }
            }
            var majName = majPattern ? majPattern.name : majority.id;
            var majColor = majority.pct > 80 ? 'text-green-400' : majority.pct > 50 ? 'text-yellow-400' : 'text-gray-400';
            html += '<div class="bg-gray-800/50 rounded-lg p-2 mt-3 mb-2 text-sm flex items-center gap-3">';
            html += '<span class="text-gray-500">Trend (' + majority.total + ' cards):</span>';
            html += '<span class="font-semibold ' + majColor + '">' + escapeHtml(majName) + '</span>';
            html += '<span class="text-gray-500">' + majority.pct + '% of recent cards</span>';
            if (result.primary && result.primary.pattern.id !== majority.id && majority.pct > 70) {
                html += '<span class="text-yellow-500 text-xs">&larr; current card disagrees with trend</span>';
            }
            html += '</div>';
        }

        // ── Per-well baseline deviation ──
        if (baseline && baseline.nCards >= 3) {
            var devColor = baseline.deviation < 1 ? 'text-green-400' : baseline.deviation < 2 ? 'text-yellow-400' : 'text-red-400';
            html += '<div class="flex items-center gap-3 mb-2 text-xs">';
            html += '<span class="text-gray-500">vs Well Baseline (' + baseline.nCards + ' cards):</span>';
            html += '<span class="' + devColor + '">Deviation: ' + baseline.deviation + '</span>';
            if (baseline.isOutlier) {
                html += '<span class="text-red-400 font-semibold">OUTLIER — this card differs significantly from this well\'s recent pattern</span>';
            } else if (baseline.deviation < 0.5) {
                html += '<span class="text-green-400">Consistent with recent pattern</span>';
            }
            html += '</div>';
        }

        // ── Calculated Reference Values (below analysis) ──
        if (wellCalc) {
            html += '<details class="mt-3">';
            html += '<summary class="text-sm text-gray-400 cursor-pointer">Calculated Values</summary>';
            html += '<div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mt-2 text-xs">';
            html += '<div class="bg-gray-800 rounded px-2 py-1.5"><span class="text-gray-500">Calc Fo:</span> <span class="text-fae-gold">' + wellCalc.Fo + ' lbs</span></div>';
            var foSrc = wellCalc.actualFoDH != null ? wellCalc.actualFoDH : wellCalc.actualFoSurf;
            var foLabel = wellCalc.actualFoDH != null ? 'Actual Fo (DH)' : 'Actual Fo (surf)';
            html += '<div class="bg-gray-800 rounded px-2 py-1.5"><span class="text-gray-500">' + foLabel + ':</span> <span class="text-gray-200">' + foSrc + ' lbs</span></div>';
            html += '<div class="bg-gray-800 rounded px-2 py-1.5"><span class="text-gray-500">Est FAP:</span> <span class="text-fae-gold">' + (wellCalc.estFAP || '—') + ' ft</span> <span class="text-gray-600 text-[10px]">/ ' + wellCalc.pumpDepthFt + ' ft depth</span></div>';
            html += '<div class="bg-gray-800 rounded px-2 py-1.5"><span class="text-gray-500">Buoyant Wr:</span> <span class="text-gray-200">' + wellCalc.buoyWt + ' lbs</span></div>';
            html += '<div class="bg-gray-800 rounded px-2 py-1.5"><span class="text-gray-500">Exp PPRL:</span> <span class="text-gray-200">' + wellCalc.expPPRL + ' lbs</span></div>';
            html += '<div class="bg-gray-800 rounded px-2 py-1.5"><span class="text-gray-500">Act PPRL:</span> <span class="text-gray-200">' + (wellCalc.actPPRL || '—') + ' lbs</span></div>';
            html += '<div class="bg-gray-800 rounded px-2 py-1.5"><span class="text-gray-500">Exp MPRL:</span> <span class="text-gray-200">' + wellCalc.expMPRL + ' lbs</span></div>';
            html += '<div class="bg-gray-800 rounded px-2 py-1.5"><span class="text-gray-500">Act MPRL:</span> <span class="text-gray-200">' + (wellCalc.actMPRL || '—') + ' lbs</span></div>';
            var estFillage = wellCalc.foFillage;
            if (estFillage == null && wellCalc.Fo > 0 && wellCalc.actualFoSurf > 0) {
                estFillage = Math.round(wellCalc.actualFoSurf / wellCalc.Fo * 100);
            }
            if (estFillage != null) {
                var fillColor = estFillage > 90 ? 'text-green-400' : estFillage > 60 ? 'text-yellow-400' : 'text-red-400';
                html += '<div class="bg-gray-800 rounded px-2 py-1.5 col-span-2"><span class="text-gray-500">FAE Est Fillage:</span> <span class="' + fillColor + '">' + estFillage + '%</span>';
                html += ' <span class="text-gray-600 text-[10px]">(Fo ratio: actual/calc)</span></div>';
            }
            html += '</div></details>';
        }

        content.innerHTML = html;
    }

    function hexToRgba(hex, alpha) {
        var r = parseInt(hex.slice(1, 3), 16);
        var g = parseInt(hex.slice(3, 5), 16);
        var b = parseInt(hex.slice(5, 7), 16);
        return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

            { title: 'Surface', items: [
                ['Pumping Unit', v(d.PumpingUnitID)],
                ['Stroke Length', v(d.StrokeLength)],
                ['SPM', v(d.SPM)],
                ['Motor HP', v(d.MotorHP)],
                ['Rotation', v(d.Rotation)],
            ]},
            { title: 'Pressures & Fluids', items: [
                ['Tubing Pressure', vf(d.TubingPressure, 0, ' psi')],
                ['Casing Pressure', vf(d.CasingPressure, 0, ' psi')],
                ['Water Cut', vf(d.WaterCut, 0, '%')],
                ['Water SG', v(d.WaterSG)],
                ['Oil API', v(d.OilAPIGravity)],
                ['Fluid Level', vf(d.FluidLevel, 0, ' ft')],
                ['Fluid Temp', v(d.FluidTemp)],
            ]},
            { title: 'Rod String', items: [
                ['Num Rod Sections', v(d.NumRodSections)],
                ['Total Rod Length', vf(d.TotalRodLength, 0, ' ft')],
                ['Peak Load', vf(d.PeakLoad, 0, ' lbs')],
                ['Min Load', vf(d.MinLoad, 0, ' lbs')],
            ]},
        ];

        // Add individual rod sections if available
        if (rodString && rodString.length > 0) {
            var rodItems = rodString.map(function(r) {
                var desc = '#' + r.RodNum + ': ' + (r.Grade || 'Unknown');
                var detail = vf(r.Diameter, 3, '"') + ' × ' + vf(r.Length, 0, ' ft');
                return [desc, detail];
            });
            groups.push({ title: 'Rod Sections', items: rodItems });
        }
        el.innerHTML = groups.map(function(g) {
            return '<div class="info-card">' +
                '<div class="text-fae-gold font-semibold mb-3">' + g.title + '</div>' +
                g.items.map(function(item) {
                    var label = item[0], val = item[1];
                    return '<div class="detail-row">' +
                        '<span class="text-gray-400 text-sm">' + label + '</span>' +
                        '<span class="text-sm">' + (val || '&mdash;') + '</span>' +
                    '</div>';
                }).join('') +
            '</div>';
        }).join('');
    }

    // ── Tabs ──
    document.querySelectorAll('.tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            ['cards', 'analysis', 'wellinfo', 'alarms'].forEach(function(id) {
                document.getElementById('tab-' + id).classList.toggle('hidden', id !== tab.dataset.tab);
            });
        });
    });

    // ── Well navigation (prev/next arrows with filter) ──
    var allWellsData = [];  // raw wells array from wells.json
    var wellFilter = 'all';

    function wellMatchesFilter(w) {
        if (wellFilter === 'all') return true;
        var s = (w.RunStatus || '').toLowerCase();
        var c = (w.CommStatus || '');
        if (wellFilter === 'running') return s.includes('running');
        if (wellFilter === 'idle') return s.includes('idle');
        if (wellFilter === 'shutdown') return s.includes('shutdown');
        if (wellFilter === 'commgood') return c === 'OK';
        if (wellFilter === 'commfail') return c !== 'OK';
        return true;
    }

    function updateWellNav() {
        var filtered = allWellsData
            .filter(function(w) { return w.Enabled !== false; })
            .filter(wellMatchesFilter)
            .map(function(w) { return w.NodeID; })
            .sort();
        var idx = filtered.indexOf(NODE_ID);

        var prevBtn = document.getElementById('prevWell');
        var nextBtn = document.getElementById('nextWell');
        var posEl = document.getElementById('wellPosition');

        // Reset
        prevBtn.disabled = true;
        prevBtn.title = 'Previous well';
        prevBtn.onclick = null;
        nextBtn.disabled = true;
        nextBtn.title = 'Next well';
        nextBtn.onclick = null;

        if (idx < 0) {
            posEl.textContent = 'Not in filter (' + filtered.length + ' wells)';
            return;
        }

        posEl.textContent = (idx + 1) + ' / ' + filtered.length;

        var filterParam = wellFilter !== 'all' ? '&filter=' + wellFilter : '';
        if (idx > 0) {
            prevBtn.disabled = false;
            prevBtn.title = filtered[idx - 1];
            prevBtn.onclick = function() {
                window.location.href = 'well.html?id=' + encodeURIComponent(filtered[idx - 1]) + filterParam;
            };
        }
        if (idx < filtered.length - 1) {
            nextBtn.disabled = false;
            nextBtn.title = filtered[idx + 1];
            nextBtn.onclick = function() {
                window.location.href = 'well.html?id=' + encodeURIComponent(filtered[idx + 1]) + filterParam;
            };
        }
    }

    async function loadWellNav() {
        try {
            var resp = await fetch('data/wells.json?t=' + Date.now());
            if (!resp.ok) return;
            var data = await resp.json();
            allWellsData = data.wells || [];

            // Restore filter from URL param
            var filterParam = params.get('filter');
            if (filterParam) {
                wellFilter = filterParam;
                document.querySelectorAll('#wellFilterBar .filter-btn').forEach(function(btn) {
                    btn.classList.toggle('active', btn.dataset.filter === wellFilter);
                });
            }

            updateWellNav();
        } catch(e) { /* silent */ }
    }

    // Filter button clicks
    document.querySelectorAll('#wellFilterBar .filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#wellFilterBar .filter-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            wellFilter = btn.dataset.filter;
            updateWellNav();
        });
    });

    // ── Init ──
    if (NODE_ID) {
        loadWellDetails();
        loadCards();
        loadAlarms();
        loadWellNav();
    }
    </script>
</body>
</html>
