<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map — Forty Acres Rod Status</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'fae-blue': '#1e3a5f', 'fae-gold': '#c8a951' } } } }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; }
        html, body { height: 100%; }
        #login-overlay { position:fixed;inset:0;z-index:9999;background:#111827;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem; }
        .login-logo { font-size:2.5rem;font-weight:700;color:#c8a951;letter-spacing:0.05em; }
        .login-logo span { color:#64748b; }
        .login-tagline { color:#94a3b8;font-size:0.95rem; }
        .login-title { color:#e2e8f0;font-size:1.1rem;margin-bottom:0.5rem; }
        .login-error { display:none;margin-top:0.5rem;font-size:0.85rem; }

        #map { position: absolute; top: 56px; bottom: 0; left: 0; right: 0; background:#111827; }
        nav { position: relative; z-index: 500; }

        /* Layer panel (floats inside the map) */
        .layer-panel {
            position: absolute; top: 12px; right: 12px; z-index: 600;
            background: rgba(17,24,39,0.92); border: 1px solid #c8a95133;
            border-radius: 8px; padding: 10px 12px; max-width: 300px;
            color: #e5e7eb; font-size: 0.85rem; box-shadow: 0 6px 24px rgba(0,0,0,0.4);
            max-height: calc(100vh - 96px); overflow: auto;
        }
        .layer-panel h3 { color:#c8a951; font-size:0.8rem; font-weight:600; margin: 6px 0 4px; letter-spacing:0.05em; text-transform: uppercase; }
        .layer-panel label { display:flex; align-items:center; gap:8px; padding:3px 0; cursor:pointer; }
        .layer-panel label:hover { color:#fff; }
        .layer-panel .swatch { width: 12px; height: 12px; border-radius: 50%; flex: 0 0 12px; border:1px solid rgba(255,255,255,0.3); }
        .layer-panel .count { color:#6b7280; font-size:0.7rem; margin-left:auto; }
        .layer-panel input[type=checkbox] { accent-color: #c8a951; }
        .basemap-row { display:flex; gap:6px; margin-bottom: 8px; }
        .basemap-btn { flex:1; padding:4px 6px; border-radius:5px; border:1px solid #374151; background:#1f2937; color:#9ca3af; font-size:0.75rem; cursor:pointer; }
        .basemap-btn.active { border-color:#c8a951; color:#c8a951; background: rgba(200,169,81,0.12); }

        /* Loading badge */
        #loading-badge {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            z-index: 700; padding: 6px 12px; border-radius: 6px;
            background: rgba(17,24,39,0.9); color:#c8a951; font-size:0.8rem;
            border:1px solid #c8a95133; display:none;
        }

        /* Popup styling */
        .leaflet-popup-content-wrapper { background:#1f2937; color:#e5e7eb; }
        .leaflet-popup-tip { background:#1f2937; }
        .leaflet-popup-content { margin: 8px 12px; font-size: 0.85rem; max-width: 260px; }
        .leaflet-popup-content .pname { color:#c8a951; font-weight:600; margin-bottom:4px; }
        .leaflet-popup-content .pdesc { color:#cbd5e1; font-size:0.78rem; line-height:1.35; }
        .leaflet-popup-content a { color:#93c5fd; }
        .leaflet-container a.leaflet-popup-close-button { color:#9ca3af; }

        /* Marker cluster — FAE colors */
        .marker-cluster { background: rgba(200,169,81,0.25); }
        .marker-cluster div { background: rgba(200,169,81,0.7); color:#111827; font-weight:600; }

        /* Well-type SVG icons */
        .well-icon { display:block; }
        .well-icon svg { display:block; overflow:visible; }
        .well-icon.faded { opacity: 0.55; }
        .well-icon.plugged svg { filter: grayscale(0.6); }

        .legend-row { display:flex; align-items:center; gap:6px; padding:2px 0; font-size:0.78rem; color:#cbd5e1; }
        .legend-row svg { flex:0 0 16px; }

        /* Permanent feature labels — readable on satellite imagery */
        .fae-label {
            background: transparent;
            border: none;
            box-shadow: none;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            text-shadow: 0 0 2px #000, 0 0 3px #000, 1px 1px 2px #000;
            padding: 0 2px;
            white-space: nowrap;
            pointer-events: none;
        }
        .fae-label::before { display: none; }  /* hide tooltip arrow */
        /* Hide all labels by default; .labels-on body shows them */
        .leaflet-tooltip.fae-label { display: none; }
        body.labels-on .leaflet-tooltip.fae-label { display: block; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">

<!-- Login overlay -->

  <div><div class="login-logo">fae<span>II</span></div></div>
  <div class="login-tagline">forty acres <em>energy</em> &nbsp;&middot;&nbsp; Map</div>
  <div class="login-title">Sign in to continue</div>

       data-client_id="629380732564-eh0uasomqjdo3up8o2po685g9ep544iq.apps.googleusercontent.com"

  <div class="g_id_signin"

<nav class="bg-fae-blue border-b border-fae-gold/30 px-4 py-3" style="height:56px; display:flex; align-items:center;">
  <div class="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-3 w-full">
    <div class="flex items-center gap-4">
      <a href="index.html" class="text-xl font-bold text-fae-gold">Forty Acres Rod Status</a>

<div id="map"></div>
<div id="loading-badge">Loading layer…</div>

<div class="layer-panel" id="layerPanel">
  <h3>Display</h3>
  <label style="margin-bottom:6px">
    <input type="checkbox" id="labelsToggle" checked>
    <span>Show names</span>

  <h3>Basemap</h3>
  <div class="basemap-row">
    <button class="basemap-btn active" data-bm="esri">Satellite</button>

    <input type="checkbox" id="pumperToggle" checked>
    <span>Pumper Data wells</span>
  </label>

  <h3>KMZ Layers</h3>
  <div id="layerList"></div>

<script>
// ── Auth (same as index.html) ────────────────────────────────────────
const ACCOUNTS_CSV = 'https://docs.google.com/spreadsheets/d/146yuHYjs3RF3wtCK3Qj9NXH94DrStwhieTGqPeLQRfA/gviz/tq?tqx=out:csv&sheet=Accounts&headers=1';
const SESSION_KEY  = 'fae_scada_user';
const SESSION_HRS  = 720;

function parseCSVLine(line) {
  const out = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ''; }
    else cur += ch;
  }
  out.push(cur.trim()); return out;
}

async function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const email   = payload.email.toLowerCase();
  const picture = payload.picture;
  const errorEl = document.getElementById('login-error');
  errorEl.style.cssText = 'display:block;color:#90bc90';
  errorEl.textContent   = 'Checking access...';
  try {
    const csv  = await fetch(ACCOUNTS_CSV).then(r => r.text());
    const lines = csv.trim().split('\n');
    const rows  = lines.slice(1).map(l => { const c = parseCSVLine(l); return { email: c[0], displayName: c[1] }; });
    const match = rows.find(r => r.email.toLowerCase() === email && r.email !== 'x');
    if (!match) {
      errorEl.style.color = '#ff8080';
      errorEl.textContent = 'Access denied for ' + email + '. Contact Ryan Swift.';
      return;
    }
    const session = { email, displayName: match.displayName, picture,
                      credential: response.credential,
                      expires: Date.now() + SESSION_HRS * 3600000 };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    startApp(session);
  } catch(e) {
    errorEl.style.color = '#ff8080';
    errorEl.textContent = 'Could not verify access. Try again.';
  }
}

function signOut() { localStorage.removeItem(SESSION_KEY); location.reload(); }

(function() {
  try {
    const saved = localStorage.getItem(SESSION_KEY);
    if (saved) {
      const session = JSON.parse(saved);
      if (session.expires > Date.now() && session.credential) { startApp(session); return; }
      localStorage.removeItem(SESSION_KEY);
    }
  } catch(e) { localStorage.removeItem(SESSION_KEY); }
})();

function startApp(session) {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('user-badge').style.display = 'flex';
  document.getElementById('user-name').textContent = session.displayName || session.email || '';
  const av = document.getElementById('user-avatar');
  if (session.picture) { av.src = session.picture; av.style.display = ''; }
  initMap();
}

// ── Well-type SVG icons (industry-style) ────────────────────────────
// Designed for 18×18 viewbox, sized at 18px on map.
// Stroke #000 + drop shadow for visibility against satellite imagery.
const TYPE_STYLES = {
  // type        color      symbol     label   description
  'Oil':        { color: '#0a0a0a', symbol: 'oil',      label:'Oil',        legend: 'Oil well' },
  'Injector':   { color: '#3b82f6', symbol: 'injector', label:'Inj',        legend: 'Injection / SWD' },
  'Compressor': { color: '#9333ea', symbol: 'compressor', label:'Cmp',      legend: 'Compressor' },
  'ETC':        { color: '#f97316', symbol: 'meter',    label:'ETC',        legend: 'ETC pipeline meter' },
  'DCP':        { color: '#dc2626', symbol: 'meter',    label:'DCP',        legend: 'DCP pipeline meter' },
  'Targa':      { color: '#eab308', symbol: 'meter',    label:'Tg',         legend: 'Targa pipeline meter' },
  'Other':      { color: '#94a3b8', symbol: 'other',    label:'?',          legend: 'Other' },
  '_none':      { color: '#64748b', symbol: 'other',    label:'?',          legend: 'Unknown' },
};

function svgForType(type) {
  const s = TYPE_STYLES[type] || TYPE_STYLES['_none'];
  const c = s.color;
  const dropShadow = `filter:drop-shadow(0 0 1px #000) drop-shadow(0 0 1px #000)`;
  switch (s.symbol) {
    case 'oil':
      // USGS-style: solid filled black/dark circle
      return `<svg width="18" height="18" viewBox="-9 -9 18 18" style="${dropShadow}">
        <circle r="5" cx="0" cy="0" fill="${c}" stroke="#fff" stroke-width="1.2"/></svg>`;
    case 'injector':
      // USGS-style water injection: triangle pointing down
      return `<svg width="18" height="18" viewBox="-9 -9 18 18" style="${dropShadow}">
        <polygon points="-6,-5 6,-5 0,6" fill="${c}" stroke="#fff" stroke-width="1.2"/></svg>`;
    case 'compressor':
      // Compressor station: rounded square with "C" label
      return `<svg width="18" height="18" viewBox="-9 -9 18 18" style="${dropShadow}">
        <rect x="-5" y="-5" width="10" height="10" rx="1.5" ry="1.5" fill="${c}" stroke="#fff" stroke-width="1.2"/>
        <text x="0" y="3.2" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#fff">C</text></svg>`;
    case 'meter':
      // Pipeline meter point: diamond, color per company
      return `<svg width="18" height="18" viewBox="-9 -9 18 18" style="${dropShadow}">
        <polygon points="0,-6 6,0 0,6 -6,0" fill="${c}" stroke="#fff" stroke-width="1.2"/></svg>`;
    case 'other':
    default:
      // Open small circle
      return `<svg width="18" height="18" viewBox="-9 -9 18 18" style="${dropShadow}">
        <circle r="4" cx="0" cy="0" fill="rgba(255,255,255,0.2)" stroke="${c}" stroke-width="2"/></svg>`;
  }
}

function wellIcon(type, status) {
  const html = svgForType(type);
  const stat = (status || '').toLowerCase();
  const plugged = stat.includes('plug') || stat.includes('p&a');
  const ta = stat.includes('temporary abandon') || stat === 'ta' || stat.includes('out of compliance') || stat.includes('cancelled');
  let cls = 'well-icon';
  if (plugged) cls += ' plugged';
  if (ta && !plugged) cls += ' faded';
  return L.divIcon({
    html,
    className: cls,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
    popupAnchor: [0, -8],
    tooltipAnchor: [9, 0],
  });
}

// ── Map ──────────────────────────────────────────────────────────────
let map;
let pumperLayer = null;
const layerObjects = {};   // slug -> { layer, loaded, meta, color }
let currentBasemap;

// Color palette per layer slug (stable assignment by index)
const PALETTE = ['#c8a951','#60a5fa','#34d399','#f87171','#a78bfa','#fb923c','#22d3ee','#f472b6','#facc15','#4ade80','#fca5a5','#818cf8','#2dd4bf','#fdba74','#e879f9','#94a3b8','#fde68a','#bef264'];

function colorFor(idx) { return PALETTE[idx % PALETTE.length]; }

function initMap() {
  map = L.map('map', { zoomControl: true, preferCanvas: true }).setView([32.5, -103.5], 9);

  // Basemaps
  const esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri',
    maxZoom: 19
  });
  const esriLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19, opacity: 0.85
  });
  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  });
  const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenTopoMap (CC-BY-SA)', maxZoom: 17
  });

  const basemaps = { esri: L.layerGroup([esri, esriLabels]), osm, topo };
  currentBasemap = basemaps.esri.addTo(map);

  // ── Labels: zoom-gated permanent tooltips ──────────────────────────
  const LABEL_MIN_ZOOM = 14;
  function updateLabelsClass() {
    const wantLabels = document.getElementById('labelsToggle').checked;
    const zoomedIn = map.getZoom() >= LABEL_MIN_ZOOM;
    document.body.classList.toggle('labels-on', wantLabels && zoomedIn);
  }
  map.on('zoomend', updateLabelsClass);
  document.getElementById('labelsToggle').addEventListener('change', updateLabelsClass);
  updateLabelsClass();

  document.querySelectorAll('.basemap-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.basemap-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      map.removeLayer(currentBasemap);
      currentBasemap = basemaps[btn.dataset.bm].addTo(map);
      currentBasemap.bringToBack();
    });
  });

  buildTypeLegend();
  loadPumperWells();
  loadIndex();
}

function buildTypeLegend() {
  const wrap = document.getElementById('typeLegend');
  // Order matches typical pad-importance
  const order = ['Oil','Injector','Compressor','ETC','DCP','Targa','Other'];
  wrap.innerHTML = order.map(t => `
    <div class="legend-row">
      <span style="display:inline-flex;width:18px;height:18px">${svgForType(t)}</span>
      <span>${TYPE_STYLES[t].legend}</span>
    </div>`).join('');
}

async function loadPumperWells() {
  showBadge('Loading Pumper Data wells…');
  try {
    const data = await fetch('data/pumper_wells.json').then(r => r.json());
    const wells = data.wells || [];
    document.getElementById('pumperCount').textContent = wells.length.toLocaleString();

    const cluster = L.markerClusterGroup({
      showCoverageOnHover: false,
      maxClusterRadius: 35,
      spiderfyOnMaxZoom: true,
      disableClusteringAtZoom: 13,
    });

    for (const w of wells) {
      const m = L.marker([w.lat, w.lng], {
        icon: wellIcon(w.type, w.status),
      });
      const popup = `
        <div class="pname">${escapeHtml(w.name || w.sn)}</div>
        <div class="pdesc">
          <strong>Type:</strong> ${escapeHtml(w.type || '—')}
          &nbsp;·&nbsp;
          <strong>Status:</strong> ${escapeHtml(w.status || '—')}<br>
          ${w.pumper ? '<strong>Pumper:</strong> ' + escapeHtml(w.pumper) + '<br>' : ''}
          ${w.area   ? '<strong>Area:</strong> '   + escapeHtml(w.area)   + (w.route ? ' / Rt ' + escapeHtml(w.route) : '') + '<br>' : ''}
          ${w.unit   ? '<strong>Unit:</strong> '   + escapeHtml(w.unit)   + '<br>' : ''}
          ${w.loc    ? '<strong>Loc:</strong> '    + escapeHtml(w.loc)    + '<br>' : ''}
          ${w.api    ? '<strong>API:</strong> '    + escapeHtml(w.api)    + '<br>' : ''}
          ${w.wbd    ? '<a href="' + escapeHtml(w.wbd) + '" target="_blank">WBD link ↗</a>' : ''}
        </div>
        <div class="pdesc" style="margin-top:6px;color:#6b7280;font-size:0.7rem">FAE Pumper Data</div>`;
      m.bindPopup(popup, { autoPan: true });
      if (w.name || w.sn) {
        m.bindTooltip(w.name || w.sn, {
          permanent: true,
          direction: 'right',
          offset: L.point(10, 0),
          className: 'fae-label',
        });
      }
      cluster.addLayer(m);
    }
    pumperLayer = cluster;
    if (document.getElementById('pumperToggle').checked) {
      pumperLayer.addTo(map);
      // fit map to wells on first load
      try {
        const b = pumperLayer.getBounds();
        if (b && b.isValid()) map.fitBounds(b, { padding: [40, 40], maxZoom: 11 });
      } catch(e) {}
    }
  } catch(e) {
    console.warn('Pumper wells load failed:', e);
  } finally {
    hideBadge();
  }
}

// Pumper layer toggle
document.addEventListener('change', e => {
  if (e.target && e.target.id === 'pumperToggle') {
    if (!pumperLayer) return;
    if (e.target.checked && !map.hasLayer(pumperLayer)) pumperLayer.addTo(map);
    else if (!e.target.checked && map.hasLayer(pumperLayer)) map.removeLayer(pumperLayer);
  }
});

async function loadIndex() {
  const idx = await fetch('data/map/index.json').then(r => r.json());
  const list = document.getElementById('layerList');
  list.innerHTML = '';
  idx.layers.forEach((meta, i) => {
    const color = colorFor(i);
    layerObjects[meta.slug] = { layer: null, loaded: false, meta, color };
    const row = document.createElement('label');
    row.innerHTML = `
      <input type="checkbox" data-slug="${meta.slug}" ${meta.default_on ? 'checked' : ''}>
      <span class="swatch" style="background:${color}"></span>
      <span>${meta.title}</span>
      <span class="count">${meta.feature_count.toLocaleString()}</span>`;
    list.appendChild(row);
    row.querySelector('input').addEventListener('change', e => toggleLayer(meta.slug, e.target.checked));
  });

  // Pre-load default-on layers and fit bounds to their union
  const defaults = idx.layers.filter(m => m.default_on);
  if (defaults.length === 0) return;
  await Promise.all(defaults.map(m => loadLayer(m.slug)));
  fitToVisible();
}

function showBadge(text) {
  const b = document.getElementById('loading-badge');
  b.textContent = text; b.style.display = 'block';
}
function hideBadge() { document.getElementById('loading-badge').style.display = 'none'; }

async function loadLayer(slug) {
  const obj = layerObjects[slug];
  if (!obj || obj.loaded) return;
  showBadge('Loading ' + obj.meta.title + '…');
  try {
    const gj = await fetch('data/map/' + obj.meta.file).then(r => r.json());
    obj.layer = buildLayer(gj, obj.color, obj.meta);
    obj.loaded = true;
  } finally {
    hideBadge();
  }
}

function buildLayer(geojson, color, meta) {
  const hasManyPoints = (meta.geom_counts.Point || 0) >= 50;
  const cluster = hasManyPoints ? L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 50,
    spiderfyOnMaxZoom: true
  }) : null;

  const lineStyle = { color, weight: 2, opacity: 0.85 };
  const polyStyle = { color, weight: 1.5, opacity: 0.9, fillColor: color, fillOpacity: 0.15 };

  const gj = L.geoJSON(geojson, {
    style: feature => {
      const t = feature.geometry.type;
      if (t === 'LineString' || t === 'MultiLineString') return lineStyle;
      if (t === 'Polygon' || t === 'MultiPolygon') return polyStyle;
      return {};
    },
    pointToLayer: (feature, latlng) => {
      return L.circleMarker(latlng, {
        radius: 5, color: '#111827', weight: 1.5,
        fillColor: color, fillOpacity: 0.95
      });
    },
    onEachFeature: (feature, layer) => {
      const p = feature.properties || {};
      const html = `
        <div class="pname">${escapeHtml(p.name || '(unnamed)')}</div>
        ${p.desc ? `<div class="pdesc">${escapeHtml(p.desc)}</div>` : ''}
        <div class="pdesc" style="margin-top:6px;color:#6b7280;font-size:0.7rem">${escapeHtml(meta.title)}</div>`;
      layer.bindPopup(html, { autoPan: true });
      if (p.name) {
        const t = feature.geometry.type;
        const dir = (t === 'Point') ? 'right' : 'center';
        const offset = (t === 'Point') ? L.point(8, 0) : L.point(0, 0);
        layer.bindTooltip(p.name, {
          permanent: true,
          direction: dir,
          offset,
          className: 'fae-label',
          sticky: false
        });
      }
    }
  });

  if (cluster) {
    // Add only point markers to the cluster, lines/polys directly to map
    const clusterPoints = L.featureGroup();
    const otherGeoms = L.featureGroup();
    gj.eachLayer(l => {
      if (l instanceof L.CircleMarker) clusterPoints.addLayer(l);
      else otherGeoms.addLayer(l);
    });
    cluster.addLayer(clusterPoints);
    const group = L.featureGroup([cluster, otherGeoms]);
    group.addTo(map);
    return group;
  }
  gj.addTo(map);
  return gj;
}

function toggleLayer(slug, on) {
  const obj = layerObjects[slug];
  if (!obj) return;
  if (on) {
    if (!obj.loaded) {
      loadLayer(slug);
    } else if (obj.layer && !map.hasLayer(obj.layer)) {
      obj.layer.addTo(map);
    }
  } else if (obj.layer && map.hasLayer(obj.layer)) {
    map.removeLayer(obj.layer);
  }
}

function fitToVisible() {
  const bounds = L.latLngBounds([]);
  Object.values(layerObjects).forEach(o => {
    if (o.layer && map.hasLayer(o.layer) && typeof o.layer.getBounds === 'function') {
      try {
        const b = o.layer.getBounds();
        if (b && b.isValid()) bounds.extend(b);
      } catch(e) {}
    }
  });
  if (bounds.isValid()) map.fitBounds(bounds, { padding: [30, 30], maxZoom: 13 });
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
